<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>/*[|template_title|]*/0</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            *, *::before, *::after { box-sizing: border-box; }

            .staticrypt-html { height: 100%; overflow: hidden; }

            .staticrypt-body {
                height: 100%; margin: 0; padding: 0;
                background: radial-gradient(circle at 50% 50%, #2a0845 0%, #0f0c20 70%, #05030a 100%);
                font-family: "SF Pro Display", "Microsoft YaHei", "PingFang SC", sans-serif;
                display: block; position: relative; overflow: hidden;
            }

            /* ==== 财富符号漫天飞舞层 ==== */
            .dollar-container {
                position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                pointer-events: none; z-index: 0; overflow: hidden;
            }
            .dollar {
                position: absolute; font-weight: bold; user-select: none;
                opacity: 0; will-change: transform, opacity;
                animation: flyAround 12s linear infinite;
                text-shadow: 0 0 8px rgba(46, 204, 113, 0.6), 0 0 15px rgba(241, 196, 15, 0.8);
            }
            @keyframes flyAround {
                0%   { transform: translate(var(--startX), var(--startY)) rotate(0deg) scale(0.6); opacity: 0; }
                10%  { opacity: 0.9; }
                90%  { opacity: 0.9; }
                100% { transform: translate(var(--endX), var(--endY)) rotate(var(--rot)) scale(1.4); opacity: 0; }
            }

            /* ==== 主内容居中 ==== */
            .staticrypt-content {
                height: 100%; display: table; width: 100%;
                position: relative; z-index: 10;
            }
            .staticrypt-page {
                display: table-cell; vertical-align: middle; text-align: center; padding: 20px;
            }

            /* ==== 玉玺印章式主框(替换赌场风) ==== */
            .staticrypt-form {
                background: linear-gradient(135deg, #8b0000 0%, #b8001a 50%, #6a0010 100%);
                border: 4px solid #f1c40f;
                border-radius: 20px;
                max-width: 420px;
                margin: 0 auto;
                padding: 40px 32px 32px;
                text-align: center;
                box-shadow: 0 0 40px rgba(241, 196, 15, 0.55),
                            inset 0 0 25px rgba(0, 0, 0, 0.6),
                            0 20px 40px rgba(0, 0, 0, 0.7);
                position: relative;
            }
            /* 玉玺角部纹饰 */
            .staticrypt-form::before {
                content: '';
                position: absolute;
                top: -3px; left: -3px; right: -3px; bottom: -3px;
                border: 2px solid rgba(241, 196, 15, 0.6);
                border-radius: 16px;
                pointer-events: none;
                animation: sealGlow 3s infinite ease-in-out;
            }
            @keyframes sealGlow {
                0%,100% { filter: drop-shadow(0 0 4px #f1c40f); opacity: 0.7; }
                50%     { filter: drop-shadow(0 0 12px #f1c40f); opacity: 1; }
            }

            /* ==== 标题牌 ==== */
            .staticrypt-instructions {
                background: rgba(0, 0, 0, 0.55);
                border: 2px solid #f39c12;
                border-radius: 10px;
                padding: 16px 12px;
                margin-bottom: 24px;
                box-shadow: inset 0 0 15px rgba(241, 196, 15, 0.3);
            }
            .staticrypt-title {
                font-size: 22px;
                font-weight: 900;
                color: #f1c40f;
                margin: 0 0 8px 0;
                letter-spacing: 3px;
                text-shadow: 0 0 10px #f1c40f, 0 0 18px #ff9500;
                animation: textPulse 2s infinite alternate ease-in-out;
                line-height: 1.3;
            }
            @keyframes textPulse {
                0%   { transform: scale(0.98); filter: brightness(1); }
                100% { transform: scale(1.02); filter: brightness(1.2); }
            }
            .staticrypt-instructions p:last-child {
                margin: 0;
                color: #2ecc71;
                font-size: 12.5px;
                font-weight: bold;
                letter-spacing: 1px;
                text-shadow: 0 0 5px rgba(46, 204, 113, 0.4);
            }

            .staticrypt-hr { display: none; }

            /* ==== 密码显示屏 ==== */
            .staticrypt-password-container {
                position: relative;
                background: #0a0a0a;
                border: 2px solid #f1c40f;
                border-radius: 40px;
                margin: 0 auto 18px;
                overflow: hidden;
                box-shadow: inset 0 4px 10px rgba(0,0,0,0.9),
                            0 0 12px rgba(241,196,15,0.25);
            }
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                color: #00ff88;
                font-family: 'SF Mono', 'Courier New', Courier, monospace;
                font-size: 18px;
                font-weight: bold;
                letter-spacing: 4px;
                outline: 0;
                padding: 14px 50px 14px 25px;
                width: 100%;
                text-align: center;
            }
            .staticrypt-form input::placeholder {
                color: #4a4a4a;
                letter-spacing: 0px;
                font-family: "PingFang SC", sans-serif;
                font-size: 13px;
                font-weight: normal;
            }
            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px; width: 18px;
                opacity: 0.55;
                position: absolute;
                right: 20px; top: 50%;
                transform: translateY(-50%);
                filter: invert(1) sepia(1) saturate(5) hue-rotate(90deg);
                transition: opacity 0.2s;
            }
            .staticrypt-toggle-password-visibility:hover { opacity: 1; }

            /* ==== 记住我 ==== */
            label.staticrypt-remember {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 20px;
                color: #fff;
                font-size: 12.5px;
                cursor: pointer;
                font-weight: 600;
                text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            }
            .staticrypt-remember input[type="checkbox"] {
                accent-color: #f1c40f;
                transform: scale(1.15);
                margin-right: 8px;
                cursor: pointer;
            }

            /* ==== 解锁按钮 ==== */
            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                outline: 0;
                background: linear-gradient(180deg, #f1c40f 0%, #f39c12 50%, #d35400 100%);
                width: 100%;
                border: 2px solid rgba(255,255,255,0.85);
                border-radius: 40px;
                padding: 15px;
                color: #fff;
                font-size: 17px;
                font-weight: 900;
                letter-spacing: 3px;
                cursor: pointer;
                box-shadow: 0 6px 0 #a04000, 0 8px 15px rgba(0,0,0,0.5);
                text-shadow: 1px 2px 2px rgba(0,0,0,0.5);
                transition: filter 0.15s, top 0.05s, box-shadow 0.05s;
                position: relative;
                top: 0;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover { filter: brightness(1.1); }
            .staticrypt-form .staticrypt-decrypt-button:active {
                top: 4px;
                box-shadow: 0 2px 0 #a04000, 0 4px 6px rgba(0,0,0,0.5);
            }

            /* ==== 加载 Spinner ==== */
            .staticrypt-spinner-container {
                position: absolute;
                top: 0; left: 0; right: 0; bottom: 0;
                background: #0f0c20;
                z-index: 100;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .staticrypt-spinner {
                width: 3rem; height: 3rem;
                border: 0.3em solid #f1c40f;
                border-right-color: transparent;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
                filter: drop-shadow(0 0 8px #f1c40f);
            }
            @keyframes spinner-border { 100% { transform: rotate(360deg); } }

            .hidden { display: none !important; }

            @media (max-width: 500px) {
                .staticrypt-form { max-width: 92vw; padding: 32px 22px 24px; }
                .staticrypt-title { font-size: 18px; letter-spacing: 2px; }
            }
        </style>
    </head>

                </div>
            </div>
        </div>

        <script>
            // ============ StatiCrypt 官方核心加密验证逻辑(勿动) ============
            const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
            const templateError = "/*[|template_error|]*/0",
                templateToggleAltShow = "/*[|template_toggle_show|]*/0",
                templateToggleAltHide = "/*[|template_toggle_hide|]*/0",
                isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
                staticryptConfig = /*[|staticrypt_config|]*/ 0;

            const templateConfig = {
                rememberExpirationKey: "staticrypt_expiration",
                rememberPassphraseKey: "staticrypt_passphrase",
                replaceHtmlCallback: null,
                clearLocalStorageCallback: null,
            };

            const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

            window.onload = async function () {
                const { isSuccessful } = await staticrypt.handleDecryptOnLoad();
                if (!isSuccessful) {
                    document.getElementById("staticrypt_loading").classList.add("hidden");
                    document.getElementById("staticrypt_content").classList.remove("hidden");
                    document.getElementById("staticrypt-password").focus();
                    if (isRememberEnabled) {
                        document.getElementById("staticrypt-remember-label").classList.remove("hidden");
                    }
                }
            };

            const toggleIcon = document.querySelector(".staticrypt-toggle-password-visibility");
            const imgSrcEyeClosed = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NDAgNTEyIj48IS0tIUZvbnQgQXdlc29tZSBGcmVlIDYuNS4yIGJ5IEBmb250YXdlc29tZSAtIGh0dHBzOi8vZm9udGF3ZXNvbWUuY29tIExpY2Vuc2UgLSBodHRwczovL2ZvbnRhd2Vzb21lLmNvbS9saWNlbnNlL2ZyZWUgQ29weXJpZ2h0IDIwMjQgRm9udGljb25zLCBJbmMuLS0+PHBhdGggZD0iTTM4LjggNS4xQzI4LjQtMy4xIDEzLjMtMS4yIDUuMSA5LjJTLTEuMiAzNC43IDkuMiA0Mi45bDU5MiA0NjRjMTAuNCA4LjIgMjUuNSA2LjMgMzMuNy00LjFzNi4zLTI1LjUtNC4xLTMzLjdMNTI1LjYgMzg2LjdjMzkuNi00MC42IDY2LjQtODYuMSA3OS45LTExOC40YzMuMy03LjkgMy4zLTE2LjcgMC0yNC42Yy0xNC45LTM1LjctNDYuMi04Ny43LTkzLTEzMS4xQzQ2NS41IDY4LjggNDAwLjggMzIgMzIwIDMyYy02OC4yIDAtMTI1IDI2LjMtMTY5LjMgNjAuOEwzOC44IDUuMXpNMjIzLjEgMTQ5LjVDMjQ4LjYgMTI2LjIgMjgyLjcgMTEyIDMyMCAxMTJjNzkuNSAwIDE0NCA2NC41IDE0NCAxNDRjMCAyNC45LTYuMyA0OC4zLTE3LjQgNjguN0w0MDggMjk0LjVjOC40LTE5LjMgMTAuNi00MS40IDQuOC02My4zYy0xMS4xLTQxLjUtNDcuOC02OS40LTg4LjYtNzEuMWMtNS44LS4yLTkuMiA2LjEtNy40IDExLjdjMi4xIDYuNCAzLjMgMTMuMiAzLjMgMjAuM2MwIDEwLjItMi40IDE5LjgtNi42IDI4LjNsLTkwLjMtNzAuOHpNMzczIDM4OS45Yy0xNi40IDYuNS0zNC4zIDEwLjEtNTMgMTAuMWMtNzkuNSAwLTE0NC02NC41LTE0NC0xNDRjMC02LjkgLjUtMTMuNiAxLjQtMjAuMkw4My4xIDE2MS41QzYwLjMgMTkxLjIgNDQgMjIwLjggMzQuNSAyNDMuN2MtMy4zIDcuOS0zLjMgMTYuNyAwIDI0LjZjMTQuOSAzNS43IDQ2LjIgODcuNyA5MyAxMzEuMUMxNzQuNSA0NDMuMiAyMzkuMiA0ODAgMzIwIDQ4MGM0Ny44IDAgODkuOS0xMi45IDEyNi4yLTMyLjVMMzczIDM4OS45eiIvPjwvc3ZnPg==";
            const imgSrcEyeOpened = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1NzYgNTEyIj48IS0tIUZvbnQgQXdlc29tZSBGcmVlIDYuNS4yIGJ5IEBmb250YXdlc29tZSAtIGh0dHBzOi8vZm9udGF3ZXNvbWUuY29tIExpY2Vuc2UgLSBodHRwczovL2ZvbnRhd2Vzb21lLmNvbS9saWNlbnNlL2ZyZWUgQ29weXJpZ2h0IDIwMjQgRm9udGljb25zLCBJbmMuLS0+PHBhdGggZD0iTTI4OCAzMmMtODAuOCAwLTE0NS41IDM2LjgtMTkyLjYgODAuNkM0OC42IDE1NiAxNy4zIDIwOCAyLjUgMjQzLjdjLTMuMyA3LjktMy4zIDE2LjcgMCAyNC42QzE3LjMgMzA0IDQ4LjYgMzU2IDk1LjQgMzk5LjRDMTQyLjUgNDQzLjIgMjA3LjIgNDgwIDI4OCA0ODBzMTQ1LjUtMzYuOCAxOTIuNi04MC42YzQ2LjgtNDMuNSA3OC4xLTk1LjQgOTMtMTMxLjFjMy4zLTcuOSAzLjMtMTYuNyAwLTI0LjZjLTE0LjktMzUuNy00Ni4yLTg3LjctOTMtMTMxLjFDNDMzLjUgNjguOCAzNjguOCAzMiAyODggMzJ6TTE0NCAyNTZhMTQ0IDE0NCAwIDEgMSAyODggMCAxNDQgMTQ0IDAgMSAxIC0yODggMHptMTQ0LTY0YzAgMzUuMy0yOC43IDY0LTY0IDY0Yy03LjEgMC0xMy45LTEuMi0yMC4zLTMuM2MtNS41LTEuOC0xMS45IDEuNi0xMS43IDcuNGMuMyA2LjkgMS4zIDEzLjggMy4yIDIwLjdjMTMuNyA1MS4yIDY2LjQgODEuNiAxMTcuNiA2Ny45czgxLjYtNjYuNCA2Ny45LTExNy42Yy0xMS4xLTQxLjUtNDcuOC02OS40LTg4LjYtNzEuMWMtNS44LS4yLTkuMiA2LjEtNy40IDExLjdjMi4xIDYuNCAzLjMgMTMuMiAzLjMgMjAuM3oiLz48L3N2Zz4=";

                const p = document.getElementById("staticrypt-password");
                if (p.type === "password") {
                    p.type = "text"; toggleIcon.src = imgSrcEyeOpened;
                    toggleIcon.alt = templateToggleAltHide; toggleIcon.title = templateToggleAltHide;
                } else {
                    p.type = "password"; toggleIcon.src = imgSrcEyeClosed;
                    toggleIcon.alt = templateToggleAltShow; toggleIcon.title = templateToggleAltShow;
                }
            });

            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();
                const password = document.getElementById("staticrypt-password").value,
                    isRememberChecked = document.getElementById("staticrypt-remember").checked;
                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);
                if (!isSuccessful) alert(templateError);
            });

            // ============ 财富符号漫天飞舞发生器(Gemini 定制) ============
            (function () {
                const container = document.getElementById('dollarContainer');
                if (!container) return;
                const lucks = ['$', '💵', '💰', '🪙', '💎', '🎰', '🧧', '👑', '¥'];
                // 玉玺色调:金 + 翠绿 + 中国红
                const colors = ['#f1c40f', '#2ecc71', '#ff9500', '#ffe169', '#e74c3c'];
                const totalItems = 42;

                for (let i = 0; i < totalItems; i++) {
                    const el = document.createElement('div');
                    el.className = 'dollar';
                    const sym = lucks[Math.floor(Math.random() * lucks.length)];
                    el.textContent = sym;
                    // 只有非 emoji 才染色(emoji 有自己颜色)
                    if (sym === '$' || sym === '¥') {
                        el.style.color = colors[Math.floor(Math.random() * colors.length)];
                    }
                    el.style.setProperty('--startX', (Math.random() * 110 - 5) + 'vw');
                    el.style.setProperty('--startY', (Math.random() * 110 - 5) + 'vh');
                    el.style.setProperty('--endX',   (Math.random() * 110 - 5) + 'vw');
                    el.style.setProperty('--endY',   (Math.random() * 110 - 5) + 'vh');
                    el.style.setProperty('--rot',    (Math.random() * 720 - 360) + 'deg');
                    el.style.animationDelay = (Math.random() * -15) + 's';
                    el.style.animationDuration = (7 + Math.random() * 8) + 's';
                    el.style.fontSize = (16 + Math.random() * 24) + 'px';
                    container.appendChild(el);
                }
            })();
        </script>
    </body>
</html>
